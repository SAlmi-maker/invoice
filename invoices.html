  <!-- MAIN CONTENT -->
  <main class="main-content">
    <header class="topbar">
      <button class="topbar-hamburger" id="hamburger" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">

          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h2 class="topbar-title" data-i18n="nav.invoices">Invoices</h2>
      <div class="topbar-actions">
        <button class="theme-toggle-btn" id="themeToggle">
          <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="theme-icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button onclick="JOSKA_INVOICE.newInvoice()" class="btn btn-primary btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Invoice
        </button>
      </div>
    </header>

    <div class="page-body">
      <div class="page-header fade-in-up">
        <h1 data-i18n="nav.invoices">Invoices</h1>
        <p>Manage car rental invoices</p>
      </div>

      <!-- Invoice Form -->
      <div class="section-card glass-card" id="invoiceFormCard" style="display:none;">
        <div class="section-header">
          <h3 id="formTitle">New Invoice</h3>
          <button onclick="JOSKA_INVOICE.cancelForm()" class="btn btn-ghost btn-sm">Cancel</button>
        </div>
        <div class="settings-section-body">
          <form id="invoiceForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Client Name</label>
                <input type="text" id="clientName" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label">CIN / Passport</label>
                <input type="text" id="clientCin" class="form-input" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" id="clientPhone" class="form-input" />
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="clientEmail" class="form-input" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Vehicle Brand</label>
                <input type="text" id="vehicleBrand" class="form-input" />
              </div>
              <div class="form-group">
                <label class="form-label">Vehicle Model</label>
                <input type="text" id="vehicleModel" class="form-input" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Registration Plate</label>
                <input type="text" id="registrationPlate" class="form-input" />
              </div>
              <div class="form-group">
                <label class="form-label">Invoice Number</label>
                <input type="text" id="invoiceNumber" class="form-input" value="INV-0001" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Rental Start Date</label>
                <input type="date" id="rentalStart" class="form-input" />
              </div>
              <div class="form-group">
                <label class="form-label">Rental End Date</label>
                <input type="date" id="rentalEnd" class="form-input" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Daily Price (MAD)</label>
                <input type="number" id="dailyPrice" class="form-input" step="0.01" value="0" oninput="JOSKA_INVOICE.calculateTotals()" />
              </div>
              <div class="form-group">
                <label class="form-label">Number of Days</label>
                <input type="number" id="numDays" class="form-input" value="1" readonly />
              </div>
            </div>

            <h4 style="margin: 20px 0 12px;">Additional Charges</h4>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Insurance (MAD)</label>
                <input type="number" id="insurance" class="form-input" step="0.01" value="0" oninput="JOSKA_INVOICE.calculateTotals()" />
              </div>
              <div class="form-group">
                <label class="form-label">Fuel (MAD)</label>
                <input type="number" id="fuel" class="form-input" step="0.01" value="0" oninput="JOSKA_INVOICE.calculateTotals()" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Extra Driver (MAD)</label>
                <input type="number" id="extraDriver" class="form-input" step="0.01" value="0" oninput="JOSKA_INVOICE.calculateTotals()" />
              </div>
              <div class="form-group">
                <label class="form-label">Other Charges (MAD)</label>
                <input type="number" id="otherCharges" class="form-input" step="0.01" value="0" oninput="JOSKA_INVOICE.calculateTotals()" />
              </div>
            </div>

            <div class="form-group" style="margin-top:24px;">
              <label class="form-label">Notes / Terms</label>
              <textarea id="notes" class="form-textarea" rows="3"></textarea>
            </div>

            <div style="background:#f8fafc; padding:20px; border-radius:12px; margin-top:24px;">
              <div style="display:flex; justify-content:space-between; font-size:1.1rem; margin-bottom:8px;">
                <strong>Subtotal</strong>
                <span id="subtotal">0.00 MAD</span>
              </div>
              <div style="display:flex; justify-content:space-between; font-size:1.1rem; font-weight:700; color:var(--primary);">
                <strong>Total</strong>
                <span id="totalAmount">0.00 MAD</span>
              </div>
            </div>

            <div class="settings-save-bar" style="margin-top:24px;">
              <button type="button" onclick="JOSKA_INVOICE.cancelForm()" class="btn btn-ghost">Cancel</button>
              <button type="button" onclick="JOSKA_INVOICE.saveInvoice()" class="btn btn-primary">Save &amp; Generate Invoice</button>
              <button type="button" onclick="JOSKA_INVOICE.exportPDF()" class="btn btn-primary" style="margin-left:8px;">Export PDF</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Invoice List -->
      <div class="section-card glass-card" id="invoiceListCard">
        <div class="section-header">
          <h3>Recent Invoices</h3>
          <input type="text" id="invoiceSearch" placeholder="Search invoices..." class="form-input" style="max-width:260px;" onkeyup="JOSKA_INVOICE.filterInvoices()" />
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Invoice #</th>
                <th>Client</th>
                <th>Vehicle</th>
                <th>Date</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="invoicesTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="invoiceToast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- JOSKA Scripts -->
<script src="js/firebase.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/invoice.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    JOSKA_I18N.init();
    JOSKA_AUTH.init();
    document.addEventListener('joska:authReady', ({ detail }) => {
      if (detail.user) JOSKA_INVOICE.init(detail.user);
    });
  });
</script>
</body>
